<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy White Day 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe6f0 0%, #fff0f8 40%, #ffd6e8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      position: relative;
    }

    /* ===== 하트 배경 ===== */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.7;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ===== 메인 컨테이너 ===== */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ===== 해피 화이트데이 텍스트 ===== */
    .title {
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 900;
      text-align: center;
      background: linear-gradient(90deg, #ff6fa8, #ff9ec4, #ffb3d1, #ff6fa8);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s linear infinite, popIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) both;
      text-shadow: none;
      letter-spacing: 2px;
    }
    .title span { display: block; }
    .subtitle {
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #ff8ab8;
      animation: popIn 0.8s 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
      letter-spacing: 4px;
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    @keyframes popIn {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    /* ===== 로봇 강아지 ===== */
    .robot-dog-wrap {
      position: relative;
      animation: danceBounce 0.5s ease-in-out infinite alternate, popIn 0.8s 0.1s cubic-bezier(0.175,0.885,0.32,1.275) both;
    }
    @keyframes danceBounce {
      0%   { transform: translateY(0)   rotate(-4deg) scaleX(1);   }
      100% { transform: translateY(-18px) rotate(4deg) scaleX(0.97); }
    }

    .robot-dog {
      width: 180px;
      height: 180px;
      position: relative;
    }

    /* 몸통 */
    .body {
      width: 110px;
      height: 70px;
      background: linear-gradient(160deg, #b8d4ff, #7eb3ff);
      border-radius: 30px;
      position: absolute;
      bottom: 30px;
      left: 35px;
      box-shadow: 0 4px 16px #7eb3ff88;
    }
    /* 가슴 패널 */
    .body::after {
      content: '';
      width: 50px; height: 30px;
      background: linear-gradient(135deg, #ffe6f0, #ffd0e8);
      border-radius: 12px;
      position: absolute;
      top: 12px; left: 30px;
      box-shadow: inset 0 2px 4px #ff9ec455;
    }
    /* 하트 버튼 */
    .body-heart {
      position: absolute;
      bottom: 46px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      animation: heartPulse 0.5s ease-in-out infinite alternate;
      z-index: 2;
    }
    @keyframes heartPulse {
      0%   { transform: translateX(-50%) scale(1);   }
      100% { transform: translateX(-50%) scale(1.35); }
    }

    /* 머리 */
    .head {
      width: 90px;
      height: 80px;
      background: linear-gradient(150deg, #c8e0ff, #90c0ff);
      border-radius: 40px 40px 30px 30px;
      position: absolute;
      top: 0;
      left: 45px;
      box-shadow: 0 4px 12px #7eb3ff66;
    }
    /* 귀 (왼쪽) */
    .ear-left {
      width: 28px; height: 38px;
      background: linear-gradient(150deg, #90c0ff, #7eb3ff);
      border-radius: 50% 50% 0 0;
      position: absolute;
      top: -20px; left: 10px;
      animation: earWiggleL 0.5s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes earWiggleL {
      0%   { transform: rotate(-12deg); }
      100% { transform: rotate(8deg);  }
    }
    /* 귀 (오른쪽) */
    .ear-right {
      width: 28px; height: 38px;
      background: linear-gradient(150deg, #90c0ff, #7eb3ff);
      border-radius: 50% 50% 0 0;
      position: absolute;
      top: -20px; right: 10px;
      animation: earWiggleR 0.5s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes earWiggleR {
      0%   { transform: rotate(12deg); }
      100% { transform: rotate(-8deg); }
    }
    /* 눈 */
    .eyes {
      display: flex;
      gap: 18px;
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
    }
    .eye {
      width: 20px; height: 20px;
      background: #222;
      border-radius: 50%;
      position: relative;
      animation: blink 3s 1.5s infinite;
    }
    .eye::after {
      content: '';
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 3px; right: 3px;
    }
    @keyframes blink {
      0%, 94%, 100% { transform: scaleY(1); }
      96%, 98%      { transform: scaleY(0.08); }
    }
    /* 코 */
    .nose {
      width: 16px; height: 10px;
      background: #444;
      border-radius: 50%;
      position: absolute;
      top: 46px;
      left: 50%;
      transform: translateX(-50%);
    }
    /* 뺨 */
    .cheek {
      width: 18px; height: 12px;
      background: #ffb3cc;
      border-radius: 50%;
      position: absolute;
      top: 42px;
      opacity: 0.8;
    }
    .cheek-left  { left: 8px; }
    .cheek-right { right: 8px; }

    /* 꼬리 */
    .tail {
      width: 18px; height: 40px;
      background: linear-gradient(#90c0ff, #7eb3ff);
      border-radius: 50% 50% 0 0;
      position: absolute;
      bottom: 30px;
      right: 22px;
      transform-origin: bottom center;
      animation: tailWag 0.25s ease-in-out infinite alternate;
    }
    @keyframes tailWag {
      0%   { transform: rotate(-30deg); }
      100% { transform: rotate(30deg);  }
    }

    /* 다리 (앞) */
    .leg {
      width: 22px; height: 38px;
      background: linear-gradient(#90c0ff, #7eb3ff);
      border-radius: 12px;
      position: absolute;
      bottom: 0;
    }
    .leg-fl { left: 40px;  animation: legDanceL 0.5s ease-in-out infinite alternate; transform-origin: top center; }
    .leg-fr { left: 68px;  animation: legDanceR 0.5s ease-in-out infinite alternate; transform-origin: top center; }
    .leg-bl { right: 36px; animation: legDanceR 0.5s ease-in-out infinite alternate; transform-origin: top center; }
    .leg-br { right: 14px; animation: legDanceL 0.5s ease-in-out infinite alternate; transform-origin: top center; }
    @keyframes legDanceL {
      0%   { transform: rotate(-18deg); }
      100% { transform: rotate(10deg);  }
    }
    @keyframes legDanceR {
      0%   { transform: rotate(18deg);  }
      100% { transform: rotate(-10deg); }
    }
    /* 발 */
    .leg::after {
      content: '';
      width: 28px; height: 14px;
      background: #6aa8ff;
      border-radius: 50%;
      position: absolute;
      bottom: -4px;
      left: -3px;
    }

    /* 팔 (피카츄 댄스처럼 올렸다 내렸다) */
    .arm {
      width: 18px; height: 45px;
      background: linear-gradient(#90c0ff, #7eb3ff);
      border-radius: 10px;
      position: absolute;
      bottom: 52px;
    }
    .arm-l { left: 28px;  transform-origin: top center; animation: armDanceL 0.5s ease-in-out infinite alternate; }
    .arm-r { right: 28px; transform-origin: top center; animation: armDanceR 0.5s ease-in-out infinite alternate; }
    @keyframes armDanceL {
      0%   { transform: rotate(-80deg); }
      100% { transform: rotate(20deg);  }
    }
    @keyframes armDanceR {
      0%   { transform: rotate(80deg);  }
      100% { transform: rotate(-20deg); }
    }
    /* 손 */
    .arm::after {
      content: '';
      width: 22px; height: 22px;
      background: #6aa8ff;
      border-radius: 50%;
      position: absolute;
      bottom: -8px;
      left: -2px;
    }

    /* 안테나 */
    .antenna {
      width: 4px; height: 20px;
      background: #7eb3ff;
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
    }
    .antenna::after {
      content: '⭐';
      font-size: 0.9rem;
      position: absolute;
      top: -14px;
      left: -7px;
      animation: antennaSpin 1s linear infinite;
    }
    @keyframes antennaSpin {
      0%   { transform: rotate(0deg) scale(1);    }
      50%  { transform: rotate(180deg) scale(1.3); }
      100% { transform: rotate(360deg) scale(1);   }
    }

    /* ===== 음표 ===== */
    .notes {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .note {
      position: absolute;
      font-size: 1.4rem;
      animation: noteFloat 1.2s ease-out infinite;
      opacity: 0;
    }
    .note:nth-child(1) { left: -30px; top: 40%; animation-delay: 0s;   }
    .note:nth-child(2) { right: -30px; top: 20%; animation-delay: 0.4s; }
    .note:nth-child(3) { left: -20px; top: 10%;  animation-delay: 0.8s; }
    .note:nth-child(4) { right: -20px; top: 60%; animation-delay: 0.2s; }
    @keyframes noteFloat {
      0%   { transform: translateY(0)   rotate(0deg);   opacity: 0; }
      20%  { opacity: 1; }
      100% { transform: translateY(-70px) rotate(30deg); opacity: 0; }
    }

    /* ===== 하단 메시지 ===== */
    .message {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: #d46090;
      text-align: center;
      animation: popIn 0.8s 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
      line-height: 1.8;
    }

    /* ===== 스파클 ===== */
    .sparkle {
      position: fixed;
      pointer-events: none;
      font-size: 1.2rem;
      animation: sparklePop 1.5s ease-out forwards;
      z-index: 20;
    }
    @keyframes sparklePop {
      0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
      60%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
      100% { transform: scale(0) rotate(360deg);  opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 하트 배경 -->
  <div class="hearts-bg" id="heartsBg"></div>

  <div class="container">
    <!-- 타이틀 -->
    <div class="title">
      <span>🌸 Happy</span>
      <span>White Day 🌸</span>
    </div>
    <div class="subtitle">화이트데이 행복하세요 💕</div>

    <!-- 로봇 강아지 -->
    <div class="robot-dog-wrap">
      <div class="robot-dog">
        <div class="notes">
          <span class="note">🎵</span>
          <span class="note">🎶</span>
          <span class="note">♪</span>
          <span class="note">🎵</span>
        </div>
        <div class="tail"></div>
        <div class="body">
          <div class="body-heart">💖</div>
        </div>
        <div class="arm arm-l"></div>
        <div class="arm arm-r"></div>
        <div class="head">
          <div class="antenna"></div>
          <div class="ear-left"></div>
          <div class="ear-right"></div>
          <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>
          <div class="nose"></div>
          <div class="cheek cheek-left"></div>
          <div class="cheek cheek-right"></div>
        </div>
        <div class="leg leg-fl"></div>
        <div class="leg leg-fr"></div>
        <div class="leg leg-bl"></div>
        <div class="leg leg-br"></div>
      </div>
    </div>

    <!-- 하단 메시지 -->
    <div class="message">
      🤖 로봇 강아지가 당신을 위해 춤을 춥니다! 🐾<br>
      오늘 하루도 달콤하고 행복하세요 🍬
    </div>
  </div>

  <script>
    // 하트 떠오르기
    const heartsBg = document.getElementById('heartsBg');
    const emojis = ['💕','💖','💗','💓','🌸','⭐','✨','🍬','🤍','💝'];
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'heart-float';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (4 + Math.random() * 6) + 's';
      el.style.animationDelay = (Math.random() * 6) + 's';
      el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      heartsBg.appendChild(el);
    }

    // 클릭하면 스파클 효과
    document.addEventListener('click', (e) => {
      for (let i = 0; i < 6; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        sp.style.left = (e.clientX + (Math.random()-0.5)*80) + 'px';
        sp.style.top  = (e.clientY + (Math.random()-0.5)*80) + 'px';
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 1500);
      }
    });
  </script>
</body>
</html>
