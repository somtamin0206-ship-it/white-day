<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy White Day</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; min-height: 100vh;
      overflow: hidden;
    }

    body {
      /* Stage spotlight — matches Mickey Mouse title card tone */
      background: radial-gradient(ellipse at 50% 42%,
        #5e5e5e 0%, #323232 46%, #0c0c0c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      filter: grayscale(100%);
      animation: flicker 8s ease-in-out infinite;
      position: relative;
    }

    @keyframes flicker {
      0%,82%,85%,88%,91%,100% { filter: grayscale(100%) brightness(1); }
      83% { filter: grayscale(100%) brightness(0.82); }
      86% { filter: grayscale(100%) brightness(0.93); }
      89% { filter: grayscale(100%) brightness(0.80); }
    }

    /* ── Film grain ── */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 900;
      opacity: 0.13;
      animation: grainShift 0.1s steps(1) infinite;
    }
    .grain svg { width: 200%; height: 200%; }
    @keyframes grainShift {
      0%  { transform: translate(0,0); }     10% { transform: translate(-2%,-1%); }
      20% { transform: translate(1%, 2%); }  30% { transform: translate(-1%, 1%); }
      40% { transform: translate(2%,-2%); }  50% { transform: translate(-3%, 0); }
      60% { transform: translate(1%, 3%); }  70% { transform: translate(-2%, 2%); }
      80% { transform: translate(3%,-1%); }  90% { transform: translate(-1%,-3%); }
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 901;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 902;
      background: radial-gradient(ellipse at 50% 50%, transparent 26%, rgba(0,0,0,0.82) 100%);
    }

    /* ── Film sprocket holes ── */
    .sprockets {
      position: fixed; top: 0; bottom: 0; left: 0; width: 36px;
      display: flex; flex-direction: column; justify-content: space-around;
      align-items: center; padding: 18px 0;
      border-right: 2px solid rgba(255,255,255,0.10);
      z-index: 903;
    }
    .sprockets.right { left: auto; right: 0; border-right: none; border-left: 2px solid rgba(255,255,255,0.10); }
    .hole {
      width: 16px; height: 12px;
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 3px;
      background: rgba(0,0,0,0.5);
    }

    /* ── Title panel (Mickey Mouse title-card style) ── */
    .title-wrap {
      position: relative; z-index: 10;
      background: #060606;
      /* double-line border via box-shadow */
      border: 3px solid #d2d2d2;
      box-shadow: inset 0 0 0 7px #060606, inset 0 0 0 9px #d2d2d2;
      padding: 20px 56px 18px;
      animation: titlePulse 2.2s ease-in-out infinite;
    }
    /* corner stars */
    .title-wrap::before,
    .title-wrap::after {
      content: '★ ★';
      position: absolute;
      color: #d2d2d2;
      font-size: 0.78rem;
      letter-spacing: 6px;
    }
    .title-wrap::before { top: 6px; left: 50%; transform: translateX(-50%); }
    .title-wrap::after  { bottom: 6px; left: 50%; transform: translateX(-50%); }

    @keyframes titlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.86; }
    }

    .title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 900;
      color: #f2f2f2;
      text-align: center;
      letter-spacing: 8px;
      line-height: 1.12;
      /* thick outline — vintage cartoon lettering */
      -webkit-text-stroke: 3px #000;
      text-shadow: 2px 2px 0 #000, 3px 3px 0 #111;
    }

    /* ── Dog bounce ── */
    .dog-wrap {
      position: relative; z-index: 10;
      animation: bodyDance 0.46s ease-in-out infinite alternate;
      transform-origin: center bottom;
      filter: drop-shadow(4px 14px 10px rgba(0,0,0,0.60));
    }
    @keyframes bodyDance {
      0%   { transform: rotate(-3.5deg) translateY(0); }
      100% { transform: rotate(3.5deg)  translateY(-16px); }
    }

    .dog-svg { width: min(50vw, 250px); height: auto; }
  </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg">
      <filter id="n">
        <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="4" stitchTiles="stitch"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#n)"/>
    </svg>
  </div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="sprockets">
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>

    <div class="hole"></div><div class="hole"></div>
  </div>
  <div class="sprockets right">
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div>
  </div>

  <script>
    // Occasional film scratch lines
    const styleEl = document.createElement('style');
    styleEl.textContent = `@keyframes scratch { 0%{opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{opacity:0} }`;
    document.head.appendChild(styleEl);
    function filmScratch() {
      const n = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
          position:fixed; top:0; bottom:0; pointer-events:none; z-index:905;
          left:${10 + Math.random() * 85}%;
          width:${0.5 + Math.random() * 1.5}px;
          background:rgba(255,255,255,${0.07 + Math.random() * 0.16});
          animation:scratch ${0.1 + Math.random() * 0.2}s forwards;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 300);
      }
      setTimeout(filmScratch, 2500 + Math.random() * 5000);
    }
    filmScratch();
  </script>
</body>
