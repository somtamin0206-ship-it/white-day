<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy White Day</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; min-height: 100vh; overflow: hidden; }

    body {
      /* Raised tone: brighter centre spotlight */
      background: radial-gradient(ellipse at 50% 42%,
        #7e7e7e 0%, #4c4c4c 46%, #1c1c1c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      filter: grayscale(100%);
      animation: flicker 8s ease-in-out infinite;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    @keyframes flicker {
      0%,82%,85%,88%,91%,100% { filter: grayscale(100%) brightness(1); }
      83% { filter: grayscale(100%) brightness(0.86); }
      86% { filter: grayscale(100%) brightness(0.94); }
      89% { filter: grayscale(100%) brightness(0.83); }
    }

    /* ── Film grain ── */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 900;
      opacity: 0.11; animation: grainShift 0.1s steps(1) infinite;
    }
    .grain svg { width: 200%; height: 200%; }
    @keyframes grainShift {
      0%  { transform: translate(0,0); }     10% { transform: translate(-2%,-1%); }
      20% { transform: translate(1%, 2%); }  30% { transform: translate(-1%, 1%); }
      40% { transform: translate(2%,-2%); }  50% { transform: translate(-3%, 0);  }
      60% { transform: translate(1%, 3%); }  70% { transform: translate(-2%, 2%); }
      80% { transform: translate(3%,-1%); }  90% { transform: translate(-1%,-3%); }
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 901;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px);
    }

    /* ── Vignette (lighter) ── */
    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 902;
      background: radial-gradient(ellipse at 50% 50%, transparent 32%, rgba(0,0,0,0.68) 100%);
    }

    /* ── Sprocket holes ── */
    .sprockets {
      position: fixed; top: 0; bottom: 0; left: 0; width: 34px;
      display: flex; flex-direction: column; justify-content: space-around;
      align-items: center; padding: 18px 0;
      border-right: 2px solid rgba(255,255,255,0.13); z-index: 903;
    }
    .sprockets.right { left: auto; right: 0; border-right: none; border-left: 2px solid rgba(255,255,255,0.13); }
    .hole {
      width: 15px; height: 11px;
      border: 2px solid rgba(255,255,255,0.24); border-radius: 3px;
      background: rgba(0,0,0,0.42);
    }

    .title {
      position: relative; z-index: 10;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2.6rem, 9vw, 5.2rem);
      font-weight: 900; color: #f2f2f2;
      text-align: center; letter-spacing: 8px; line-height: 1.12;
      -webkit-text-stroke: 3px #000;
      text-shadow: 2px 2px 0 #000, 4px 4px 0 #111;
      animation: titlePulse 2.2s ease-in-out infinite;
    }
    @keyframes titlePulse { 0%,100%{opacity:1} 50%{opacity:0.87} }

    /* ── Dog bounce dance ── */
    .dog-wrap {
      position: relative; z-index: 10;
      animation: bodyDance 0.46s ease-in-out infinite alternate;
      transform-origin: center bottom;
      filter: drop-shadow(4px 14px 10px rgba(0,0,0,0.52));
    }
    @keyframes bodyDance {
      from { transform: rotate(-3deg) translateY(0); }
      to   { transform: rotate(3deg)  translateY(-13px); }
    }

    .dog-svg { width: min(46vw, 230px); height: auto; }

    /* ── Theater curtains ── */
    .curtain-l, .curtain-r {
      position: fixed; top: 0; height: 100%;
      width: 52%; z-index: 950; pointer-events: none;
      /* Vertical fabric fold pattern */
      background:
        repeating-linear-gradient(90deg,
          rgba(255,255,255,0.07) 0px,  rgba(255,255,255,0.07) 3px,
          transparent 3px, transparent 13px,
          rgba(0,0,0,0.22) 13px, rgba(0,0,0,0.22) 16px,
          transparent 16px, transparent 28px,
          rgba(255,255,255,0.04) 28px, rgba(255,255,255,0.04) 31px,
          transparent 31px, transparent 44px
        ),
        linear-gradient(180deg, #2a2a2a 0%, #111 60%, #0a0a0a 100%);
    }
    .curtain-l {
      left: 0;
      /* Inner shadow to show depth at centre seam */
      box-shadow: inset -18px 0 32px rgba(0,0,0,0.55);
      animation: openL 1.6s cubic-bezier(0.77,0,0.18,1) 0.6s both;
    }
    .curtain-r {
      right: 0;
      box-shadow: inset 18px 0 32px rgba(0,0,0,0.55);
      animation: openR 1.6s cubic-bezier(0.77,0,0.18,1) 0.6s both;
    }
    @keyframes openL { from{transform:translateX(0)} to{transform:translateX(-103%)} }
    @keyframes openR { from{transform:translateX(0)} to{transform:translateX(103%)} }

    /* Curtain top rod */
    .curtain-rod {
      position: fixed; top: 0; left: 0; right: 0;
      height: 22px; z-index: 951; pointer-events: none;
      background: linear-gradient(180deg, #666 0%, #3c3c3c 45%, #555 55%, #2a2a2a 100%);
      box-shadow: 0 4px 16px rgba(0,0,0,0.85);
      animation: rodFade 0.4s ease-in 2.1s both;
    }
    @keyframes rodFade { to { opacity: 0; } }

    /* ── Candy pop ── */
    @keyframes candyPop {
      0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
      55%  { opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(1.1) rotate(540deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Theater curtains -->
  <div class="curtain-rod"></div>
  <div class="curtain-l"></div>
  <div class="curtain-r"></div>

  <div class="grain">
    <svg xmlns="http://www.w3.org/2000/svg">
      <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="4" stitchTiles="stitch"/></filter>
      <rect width="100%" height="100%" filter="url(#n)"/>
    </svg>
  </div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="sprockets">
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div>
  </div>
  <div class="sprockets right">
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div>
  </div>

  <!-- Title -->
  <h1 class="title">HAPPY<br>WHITE DAY!</h1>

  <!-- ═══════════════════════════════════════════════
       ROBOT DOG — Pochacco-style proportions
       • Big round head  • Symmetric droopy ears
       • Small dot eyes  • Short chubby limbs
       ═══════════════════════════════════════════════ -->

    <svg class="dog-svg" viewBox="0 0 260 380" xmlns="http://www.w3.org/2000/svg">

        <!-- Head: shiny metal sphere -->
        <radialGradient id="gHead" cx="34%" cy="26%" r="66%">

        <!-- Face patch: bright ivory -->

          <stop offset="28%"  stop-color="#565656"/>
          <stop offset="58%"  stop-color="#2e2e2e"/>
          <stop offset="100%" stop-color="#080808"/>
        </linearGradient>

        <circle cx="148" cy="302" r="1.4" fill="#bbb"/>
        <rect x="141" y="301" width="18" height="48" rx="9" fill="url(#gCyl)" stroke="#111" stroke-width="1.8"/>
        <animateTransform attributeName="transform" type="rotate"
          values="12,150,302; -8,150,302; 12,150,302"

      </g>

      <!-- ═══ BODY (small & round relative to head) ═══ -->
      <ellipse cx="130" cy="258" rx="46" ry="38" fill="url(#gBody)" stroke="#111" stroke-width="2.4"/>
      <!-- chest ring + lines -->
      <circle cx="130" cy="252" r="22" fill="none" stroke="#777" stroke-width="1.3"/>
      <line x1="121" y1="245" x2="139" y2="245" stroke="#888" stroke-width="0.9"/>
      <line x1="121" y1="252" x2="139" y2="252" stroke="#888" stroke-width="0.9"/>

      <!-- body rivets -->
      <circle cx="91"  cy="250" r="3.8" fill="#333" stroke="#111" stroke-width="0.9"/><circle cx="89.5" cy="248.5" r="1.4" fill="#ccc"/>
      <circle cx="169" cy="250" r="3.8" fill="#333" stroke="#111" stroke-width="0.9"/><circle cx="167.5" cy="248.5" r="1.4" fill="#ccc"/>

      <!-- ═══ LEFT ARM (tiny Pochacco-style wing flap) ═══ -->

        <circle cx="82" cy="248" r="11" fill="url(#gJoint)" stroke="#111" stroke-width="1.5"/>

      <path d="M 130 222 L 152 212 L 150 222 L 152 232 Z" fill="url(#gBow)" stroke="#111" stroke-width="1.6"/>
      <circle cx="130" cy="222" r="8.5" fill="#777" stroke="#111" stroke-width="1.6"/>
      <circle cx="129" cy="220" r="3.4" fill="#bbb"/>

      <!-- ═══ HEAD (dominant — Pochacco big-head ratio) ═══ -->

      <!-- head rivets -->
      <circle cx="56"  cy="124" r="4"  fill="#333" stroke="#111" stroke-width="0.9"/><circle cx="54.5"  cy="122.5" r="1.5" fill="#ccc"/>
      <circle cx="204" cy="124" r="4"  fill="#333" stroke="#111" stroke-width="0.9"/><circle cx="202.5" cy="122.5" r="1.5" fill="#ccc"/>

      <!-- ═══ LEFT EAR (symmetric droopy floppy ear) ═══ -->

    </svg>
  </div>

  <script>
    // ── Film scratch lines ──
    const se = document.createElement('style');
    se.textContent = `@keyframes scratch { 0%{opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{opacity:0} }`;
    document.head.appendChild(se);
    function filmScratch() {
      const n = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
          position:fixed; top:0; bottom:0; pointer-events:none; z-index:905;
          left:${10 + Math.random() * 85}%;
          width:${0.5 + Math.random() * 1.4}px;
          background:rgba(255,255,255,${0.07 + Math.random() * 0.14});
          animation:scratch ${0.1 + Math.random() * 0.2}s forwards;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 300);
      }
      setTimeout(filmScratch, 2500 + Math.random() * 5000);
    }
    filmScratch();

    // ── Candy click effect ──
    // White Day theme: candies, hearts, stars scatter from click point
    const candies = ['🍬','🍭','🍫','🤍','⭐','✨','💫','🍡','🎊','🍰'];
    document.addEventListener('click', e => {
      const n = 9 + Math.floor(Math.random() * 5);
      for (let i = 0; i < n; i++) {
        const el = document.createElement('span');
        el.textContent = candies[Math.floor(Math.random() * candies.length)];
        const angle = (360 / n) * i + (Math.random() * 28 - 14);
        const dist  = 55 + Math.random() * 100;
        const tx = Math.cos(angle * Math.PI / 180) * dist;
        const ty = Math.sin(angle * Math.PI / 180) * dist - 25;
        el.style.cssText = `
          position:fixed; left:${e.clientX}px; top:${e.clientY}px;
          font-size:${1.1 + Math.random() * 0.9}rem;
          pointer-events:none; user-select:none; z-index:910;
          line-height:1; transform-origin:center;
          --tx:${tx}px; --ty:${ty}px;
          animation:candyPop 0.9s ease-out forwards;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 950);
      }
    });
  </script>
</body>
</html>
