<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy White Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; min-height: 100vh;
      overflow: hidden;
    }

    body {
      background: radial-gradient(ellipse at 50% 45%, #f2ede0 0%, #d4ccb4 55%, #a09880 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      filter: grayscale(100%);
      animation: flicker 7s ease-in-out infinite;
      position: relative;
    }

    @keyframes flicker {
      0%,85%,87%,89%,91%,100% { filter: grayscale(100%) brightness(1); }
      86% { filter: grayscale(100%) brightness(0.88); }
      88% { filter: grayscale(100%) brightness(0.96); }
      90% { filter: grayscale(100%) brightness(0.84); }
    }

    /* ── Film grain ── */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 900;
      opacity: 0.12;
      animation: grainShift 0.1s steps(1) infinite;
    }
    .grain svg { width: 200%; height: 200%; }
    @keyframes grainShift {
      0%  { transform: translate(0,0); }
      10% { transform: translate(-2%,-1%); }
      20% { transform: translate(1%, 2%); }
      30% { transform: translate(-1%, 1%); }
      40% { transform: translate(2%,-2%); }
      50% { transform: translate(-3%, 0); }
      60% { transform: translate(1%, 3%); }
      70% { transform: translate(-2%, 2%); }
      80% { transform: translate(3%,-1%); }
      90% { transform: translate(-1%,-3%); }
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 901;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px
      );
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 902;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.72) 100%);
    }

    /* ── Film sprocket holes ── */
    .sprockets {
      position: fixed; top: 0; bottom: 0; width: 38px;
      display: flex; flex-direction: column; justify-content: space-around;
      align-items: center; padding: 18px 0;
      border-right: 2px solid rgba(0,0,0,0.15);
      z-index: 903;
    }
    .sprockets.right { left: auto; right: 0; border-right: none; border-left: 2px solid rgba(0,0,0,0.15); }
    .hole {
      width: 18px; height: 14px;
      border: 2px solid rgba(0,0,0,0.25);
      border-radius: 3px;
      background: rgba(0,0,0,0.1);
    }

    /* ── Title ── */
    .title {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      color: #111;
      text-align: center;
      letter-spacing: 4px;
      line-height: 1.05;
      position: relative; z-index: 10;
      /* Vintage cartoon outline */
      -webkit-text-stroke: 2px #000;
      text-shadow:
        3px  3px 0 #fff,
        4px  4px 0 #888,
        6px  6px 0 #333,
        7px  7px 4px rgba(0,0,0,0.5);
      animation: titleBounce 0.46s ease-in-out infinite alternate;
    }
    @keyframes titleBounce {
      0%   { transform: scale(1)    translateY(0)    rotate(-1deg); }
      100% { transform: scale(1.05) translateY(-10px) rotate(1deg); }
    }

    /* ── Dog container ── */
    .dog-wrap {
      position: relative; z-index: 10;
      animation: bodyBounce 0.46s ease-in-out infinite alternate;
      transform-origin: center bottom;
      filter: drop-shadow(6px 14px 12px rgba(0,0,0,0.45));
    }
    @keyframes bodyBounce {
      0%   { transform: translateY(0)    rotate(-2.5deg) scaleX(1);    }
      100% { transform: translateY(-18px) rotate(2.5deg)  scaleX(0.97); }
    }

    .dog-svg { width: min(52vw, 270px); height: auto; }
  </style>
</head>

  </div>
  <div class="scanlines"></div>

    <div class="hole"></div><div class="hole"></div><div class="hole"></div>

        <path d="M 152 10 L 164 -18" stroke="#444" stroke-width="2" stroke-dasharray="5,5" stroke-linecap="round"/>

          keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      </g>

    </svg>
  </div>

  <script>
    // Occasional film scratch lines
    const body = document.body;
    const styleEl = document.createElement('style');
    styleEl.textContent = `
      @keyframes scratch { 0%{opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{opacity:0} }
    `;
    document.head.appendChild(styleEl);

    function filmScratch() {
      const n = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
          position:fixed; top:0; bottom:0; pointer-events:none; z-index:905;
          left:${10 + Math.random() * 85}%;
          width:${0.5 + Math.random() * 1.5}px;
          background:rgba(255,255,255,${0.08 + Math.random() * 0.18});
          animation:scratch ${0.1 + Math.random() * 0.2}s forwards;
        `;
        body.appendChild(el);
        setTimeout(() => el.remove(), 300);
      }
      setTimeout(filmScratch, 2500 + Math.random() * 5000);
    }
    filmScratch();
  </script>
</body>
